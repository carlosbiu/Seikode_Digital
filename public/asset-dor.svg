<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <rect width="400" height="260" fill="#060d1f"/>

  <!-- Outer gear large -->
  <circle cx="160" cy="130" r="72" stroke="#1a3a5c" stroke-width="1.5" stroke-dasharray="6 3"/>
  <circle cx="160" cy="130" r="52" stroke="#1e4a7a" stroke-width="1" opacity="0.6"/>
  <circle cx="160" cy="130" r="20" stroke="#2a5a8a" stroke-width="2"/>

  <!-- Gear teeth large -->
  <g stroke="#1e4a7a" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <line x1="160" y1="55" x2="160" y2="68"/>
    <line x1="160" y1="192" x2="160" y2="205"/>
    <line x1="85" y1="130" x2="98" y2="130"/>
    <line x1="222" y1="130" x2="235" y2="130"/>
    <line x1="107" y1="77" x2="116" y2="86"/>
    <line x1="204" y1="174" x2="213" y2="183"/>
    <line x1="107" y1="183" x2="116" y2="174"/>
    <line x1="204" y1="86" x2="213" y2="77"/>
  </g>

  <!-- Inner gear small -->
  <circle cx="258" cy="92" r="36" stroke="#0f2d4a" stroke-width="1.5" stroke-dasharray="4 2"/>
  <circle cx="258" cy="92" r="24" stroke="#1a3d6a" stroke-width="1" opacity="0.7"/>
  <circle cx="258" cy="92" r="10" stroke="#2a5080" stroke-width="2"/>

  <!-- Gear teeth small -->
  <g stroke="#1a3a6a" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
    <line x1="258" y1="55" x2="258" y2="63"/>
    <line x1="258" y1="121" x2="258" y2="129"/>
    <line x1="221" y1="92" x2="229" y2="92"/>
    <line x1="287" y1="92" x2="295" y2="92"/>
    <line x1="232" y1="66" x2="238" y2="72"/>
    <line x1="278" y1="112" x2="284" y2="118"/>
    <line x1="232" y1="118" x2="238" y2="112"/>
    <line x1="278" y1="72" x2="284" y2="66"/>
  </g>

  <!-- Connecting line between gears -->
  <line x1="210" y1="112" x2="234" y2="104" stroke="#1a3a5c" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>

  <!-- Warning indicator lines -->
  <g stroke="#2a4060" stroke-width="1" opacity="0.5">
    <line x1="300" y1="150" x2="360" y2="150"/>
    <line x1="300" y1="165" x2="345" y2="165"/>
    <line x1="300" y1="180" x2="350" y2="180"/>
  </g>

  <!-- Small locked icon hint -->
  <rect x="148" y="118" width="24" height="20" rx="3" stroke="#1a4a7a" stroke-width="1.5" opacity="0.6"/>
  <path d="M153 118 v-5 a7 7 0 0 1 14 0 v5" stroke="#1a4a7a" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Subtle glow center -->
  <circle cx="160" cy="130" r="60" fill="url(#glowDor)" opacity="0.15"/>
  <defs>
    <radialGradient id="glowDor" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#007BFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#007BFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
