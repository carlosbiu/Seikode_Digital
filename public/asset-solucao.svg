<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <rect width="400" height="260" fill="#060d1f"/>

  <!-- Grid lines background -->
  <g stroke="#0d2040" stroke-width="1" opacity="0.6">
    <line x1="40" y1="60" x2="40" y2="210"/>
    <line x1="100" y1="60" x2="100" y2="210"/>
    <line x1="160" y1="60" x2="160" y2="210"/>
    <line x1="220" y1="60" x2="220" y2="210"/>
    <line x1="280" y1="60" x2="280" y2="210"/>
    <line x1="340" y1="60" x2="340" y2="210"/>
    <line x1="30" y1="80" x2="370" y2="80"/>
    <line x1="30" y1="120" x2="370" y2="120"/>
    <line x1="30" y1="160" x2="370" y2="160"/>
    <line x1="30" y1="200" x2="370" y2="200"/>
  </g>

  <!-- Area fill under curve -->
  <path d="M50 195 Q90 185 130 165 Q170 140 210 115 Q250 85 290 65 Q310 55 340 48 L340 210 L50 210 Z"
        fill="url(#areaGrad)" opacity="0.25"/>

  <!-- Main growth curve -->
  <path d="M50 195 Q90 185 130 165 Q170 140 210 115 Q250 85 290 65 Q310 55 340 48"
        stroke="#007BFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Glow on curve -->
  <path d="M50 195 Q90 185 130 165 Q170 140 210 115 Q250 85 290 65 Q310 55 340 48"
        stroke="#007BFF" stroke-width="6" stroke-linecap="round" opacity="0.15"/>

  <!-- Data points -->
  <circle cx="50"  cy="195" r="3.5" fill="#007BFF"/>
  <circle cx="130" cy="165" r="3.5" fill="#007BFF"/>
  <circle cx="210" cy="115" r="3.5" fill="#007BFF"/>
  <circle cx="290" cy="65"  r="3.5" fill="#007BFF"/>
  <circle cx="340" cy="48"  r="5"   fill="#007BFF" stroke="#1a5cb8" stroke-width="2"/>

  <!-- Top data point glow -->
  <circle cx="340" cy="48" r="12" fill="#007BFF" opacity="0.15"/>

  <!-- Floating UI card -->
  <rect x="220" y="100" width="130" height="60" rx="8" fill="#0b1021" stroke="#007BFF" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="230" y="113" width="40" height="5" rx="2.5" fill="#007BFF" opacity="0.7"/>
  <rect x="230" y="123" width="65" height="4" rx="2" fill="#1e3a6a" opacity="0.8"/>
  <rect x="230" y="133" width="50" height="4" rx="2" fill="#1e3a6a" opacity="0.6"/>
  <!-- Mini bar chart inside card -->
  <rect x="300" y="135" width="6"  height="18" rx="2" fill="#007BFF" opacity="0.5"/>
  <rect x="310" y="127" width="6"  height="26" rx="2" fill="#007BFF" opacity="0.7"/>
  <rect x="320" y="120" width="6"  height="33" rx="2" fill="#007BFF" opacity="0.9"/>
  <!-- Arrow up in card -->
  <path d="M280 118 L285 112 L290 118" stroke="#007BFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="285" y1="112" x2="285" y2="124" stroke="#007BFF" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Axis labels -->
  <line x1="40" y1="210" x2="360" y2="210" stroke="#1a3050" stroke-width="1.5"/>
  <line x1="40" y1="60"  x2="40"  y2="210" stroke="#1a3050" stroke-width="1.5"/>

  <defs>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#007BFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#007BFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
